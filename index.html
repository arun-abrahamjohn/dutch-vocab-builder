  <style>
    :root {
      --bg:     #0d0e15;
      --text:   #dde0f0;  /* 14.7:1 */
      --text-2: #7a82a6;  /* 5.1:1  — AA body text  */
      --text-3: #58607c;  /* 3.1:1  — AA large/decorative only */
      --border: rgba(255,255,255,0.08);
      --violet: #8b7cf8;
      --amber:  #d98d42;
      --green:  #42c78a;
      --red:    #d96262;
    }

    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); font-family: 'Inter', system-ui, sans-serif; }

    /* Ambient orbs */
    .orb { position: fixed; border-radius: 50%; filter: blur(90px); pointer-events: none; z-index: 0; }
    .orb-v { width: 680px; height: 680px; top: -240px; right: -180px;
              background: radial-gradient(circle, rgba(139,124,248,0.13) 0%, transparent 70%); }
    .orb-a { width: 560px; height: 560px; bottom: -180px; left: -120px;
              background: radial-gradient(circle, rgba(217,141,66,0.09) 0%, transparent 70%); }

    /* Glass surface */
    .glass {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.09);
    }

    /* Option buttons */
    .opt { transition: background 0.14s, transform 0.1s; cursor: pointer; font-family: inherit; text-align: left; }
    .opt:hover { background: rgba(255,255,255,0.07) !important; transform: translateX(3px); }
    .opt.done  { pointer-events: none; }
    .opt.done:hover { background: revert !important; transform: none !important; }

    /* Input */
    input.dutch { font-family: inherit; }
    input.dutch:focus {
      border-color: var(--violet) !important;
      box-shadow: 0 0 0 3px rgba(139,124,248,0.16);
      outline: none;
    }

    /* Entrance animation */
    @keyframes up {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .in { animation: up 0.26s cubic-bezier(0.22, 1, 0.36, 1); }
  </style>
</head>

il servant"],["redelijk","reasonable"],["gewoonte","habit"],["verzoek","request"],["leerling","pupil"],["geweld","violence"],["uitzondering","exception"],["voorwerp","object"],["gunstig","favorable"],["regeling","regulation"],["doelstelling","goal"],["verdriet","sadness"],["dichtbij","nearby"],["afspraak","appointment"],["allebei","both"],["heuvel","hill"],["voorhoofd","forehead"],["vreselijk","horrible"],["vrede","peace"],["godsdienst","religion"],["samenwerking","cooperation"],["spiegel","mirror"],["verstand","wisdom"],["onderscheid","distinction"],["aanval","attack"],["ongeluk","accident"],["sleutel","key"],["koffer","suitcase"],["afscheid","goodbye"],["vereniging","association"],["geweldig","awesome"],["woning","house"],["overeenkomst","agreement"],["voorzitter","chairman"],["milieu","environment"],["kenmerken","characteristics"],["definitief","final"],["nauwkeurig","accurate"],["bijdrage","contribution"],["overleg","consultation"],["verbazing","surprise"],["gordijnen","curtains"],["goedkoop","cheap"],["evenwicht","balance"],["vochtig","moist"],["vergelijking","comparison"],["gezondheid","health"],["gevangenis","prison"],["slaapkamer","bedroom"],["kleren","clothes"],["verbaasd","surprised"],["deken","blanket"],["vreugde","joy"],["gemak","ease"],["kunstenaar","artist"],["burgemeester","mayor"],["verlies","loss"],["burgerlijk","civil"],["lelijk","ugly"],["overig","other / remaining"],["bereid","prepared"],["koningin","queen"],["eigenaar","owner"],["ontmoeting","meeting"],["verslag","report"],["onverwacht","unexpected"],["personeel","staff"],["gezellig","cozy"],["geheugen","memory"],["verdrietig","sad"],["snelheid","speed"],["nuttig","useful"],["schade","damage"],["kapot","broken"],["bescherming","protection"],["noodzaak","need"],["jammer","unfortunately"],["toekomstig","future"],["tijdschrift","magazine"],["verdieping","floor"],["aantrekkelijk","attractive"],["opvoeding","upbringing"],["tegenstander","opponent"],["verantwoordelijkheid","responsibility"],
    ];

    const seenNl = new Set();
    const ALL_WORDS = [];
    for (const [nl, en] of RAW) {
      if (!seenNl.has(nl)) { seenNl.add(nl); ALL_WORDS.push({ nl, en }); }
    }

    // ─── Semantic categories for smart distractors ────────────────────────────
    const VERBS   = new Set(ALL_WORDS.filter(w => w.en.startsWith("to ")).map(w => w.nl));
    const COLORS  = new Set(["rood","blauw","groen","geel","wit","zwart","bruin","grijs","gouden","paars"]);
    const NUMBERS = new Set(["twee","drie","vier","vijf","zes","tien","minuut","uur","seconde","kilometer","meter","procent","miljoen"]);
    const BODY    = new Set(["hand","voet","oog","oor","neus","mond","lip","tong","nek","arm","schouder","knie","vinger","hart","bloed","hoofd","rug","buik","borst","hals","been","tand","keel","wangen","voorhoofd"]);
    const FAMILY  = new Set(["moeder","vader","broer","zuster","zoon","dochter","tante","oom","kind","vrouw","man","vriend","vriendin","partner","baby","mama","gezin"]);
    const ADVERBS = new Set(["niet","ook","al","dan","zo","nu","hier","daar","ver","later","eerst","alleen","verder","nog","soms","meer","misschien","eigenlijk","altijd","nooit","bijna","heel","zelfs","ooit","opnieuw","thuis","meteen","plotseling","eindelijk","overal","ergens","nergens","dagelijks","toch","dus","immers","namelijk","trouwens","bovendien","tenslotte","echter","nogal","vrijwel","nauwelijks","ongeveer","uiteindelijk","inderdaad","ongetwijfeld","inmiddels","intussen","toevallig","uitsluitend","wellicht"]);

    function getCategory(w) {
      if (VERBS.has(w.nl))   return "verb";
      if (COLORS.has(w.nl))  return "color";
      if (NUMBERS.has(w.nl)) return "number";
      if (BODY.has(w.nl))    return "body";
      if (FAMILY.has(w.nl))  return "family";
      if (ADVERBS.has(w.nl)) return "adverb";
      return "noun";
    }

    function getDistractors(word, n = 3) {
      const cat  = getCategory(word);
      const same  = shuffle(ALL_WORDS.filter(w => w.nl !== word.nl && getCategory(w) === cat));
      const other = shuffle(ALL_WORDS.filter(w => w.nl !== word.nl && getCategory(w) !== cat));
      return [...same, ...other].slice(0, n).map(w => w.en);
    }

    // ─── SM-2 algorithm ───────────────────────────────────────────────────────
    // phase recog: MCQ, needs 2 consecutive correct → promotes to prod
    // phase prod:  type the Dutch word, SM-2 interval growth
    // ef starts at 2.5, min 1.3

    const today    = () => new Date().toISOString().slice(0, 10);
    const addDays  = (d, n) => { const dt = new Date(d); dt.setDate(dt.getDate() + n); return dt.toISOString().slice(0, 10); };
    const daysBetween = (a, b) => Math.round((new Date(b) - new Date(a)) / 86400000);

    function newCard(nl) {
      return { nl, phase: "recog", interval: 1, ef: 2.5, dueDate: today(), lapses: 0, recogStreak: 0 };
    }

    function sm2(card, q) {
      let { interval, ef } = card;
      const newEf = Math.max(1.3, ef + 0.1 - (5 - q) * (0.08 + (5 - q) * 0.02));
      let newInterval;
      if (q < 3) {
        newInterval = 1;
      } else {
        if (interval === 1)      newInterval = 4;
        else if (interval <= 4)  newInterval = 6;
        else                     newInterval = Math.round(interval * newEf);
      }
      return { ef: newEf, interval: newInterval, dueDate: addDays(today(), newInterval) };
    }

    // ─── Storage (localStorage) ───────────────────────────────────────────────
    const STORAGE_KEY    = "dutch-sm2-v1";
    async function load() {
      try {
        const r = localStorage.getItem(STORAGE_KEY);
        return r ? JSON.parse(r) : null;
      } catch { return null; }
    }

    async function save(cards) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(cards));
      } catch (e) { console.error(e); }
    }

    function initCards(saved) {
      const savedMap = new Map((saved || []).map(c => [c.nl, c]));
      return ALL_WORDS.map(w => savedMap.get(w.nl) || newCard(w.nl));
    }

    // ─── Helpers ──────────────────────────────────────────────────────────────
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function normalize(s) {
      return s.trim().toLowerCase().replace(/[^a-záàäéèëíìïóòöúùüijn ]/g, "");
    }

    function wordFor(nl) {
      return ALL_WORDS.find(w => w.nl === nl);
    }

    function buildSessionQueue(cards) {
      const t = today();
      const due = cards
        .filter(c => c.dueDate <= t)
        .sort((a, b) => (a.dueDate < b.dueDate ? -1 : 1));

      const reviews  = due.filter(c => !(c.recogStreak === 0 && c.lapses === 0 && c.phase === "recog"));
      const newCards  = due.filter(c =>   c.recogStreak === 0 && c.lapses === 0 && c.phase === "recog").slice(0, 15);

      // interleave: 2 reviews per 1 new card
      const queue = [];
      let ri = 0, ni = 0;
      while (ri < reviews.length || ni < newCards.length) {
        if (ri < reviews.length) queue.push(reviews[ri++]);
        if (ri < reviews.length) queue.push(reviews[ri++]);
        if (ni < newCards.length) queue.push(newCards[ni++]);
      }
      return queue;
    }

    // ─── App ──────────────────────────────────────────────────────────────────
    function App() {
      const [allCards,     setAllCards]     = useState(null);
      const [queue,        setQueue]        = useState([]);
      const [current,      setCurrent]      = useState(null);
      const [options,      setOptions]      = useState([]);
      const [selected,     setSelected]     = useState(null);
      const [typed,        setTyped]        = useState("");
      const [submitted,    setSubmitted]    = useState(false);
      const [isCorrect,    setIsCorrect]    = useState(null);
      const [sessionStats, setSessionStats] = useState({ correct: 0, seen: 0 });
      const [sessionDone,  setSessionDone]  = useState(false);
      const [loading,      setLoading]      = useState(true);
      const [saveIndicator,setSaveIndicator]= useState("");
      const inputRef  = useRef(null);
      const cardsRef  = useRef(null);

      useEffect(() => {
        load().then(saved => {
          const cards = initCards(saved);
          cardsRef.current = cards;
          setAllCards(cards);
          setLoading(false);
          launchSession(cards);
        });
      }, []);

      const launchSession = (cards) => {
        const q = buildSessionQueue(cards);
        setQueue(q);
        setSessionStats({ correct: 0, seen: 0 });
        setSessionDone(false);
        if (q.length === 0) { setSessionDone(true); return; }
        showCard(q[0], cards);
      };

      const launchExtraSession = (cards) => {
        const unseen = cards.filter(c => c.recogStreak === 0 && c.lapses === 0 && c.phase === "recog");
        if (unseen.length === 0) { alert("No more new cards left!"); return; }
        const batch = unseen.slice(0, 15);
        setQueue(batch);
        setSessionStats({ correct: 0, seen: 0 });
        setSessionDone(false);
        showCard(batch[0], cards);
      };

      const showCard = (cardData, cards) => {
        const word = wordFor(cardData.nl);
        setCurrent(cardData);
        setSelected(null);
        setTyped("");
        setSubmitted(false);
        setIsCorrect(null);
        if (cardData.phase === "recog") {
          setOptions(shuffle([word.en, ...getDistractors(word)]));
        } else {
          setOptions([]);
          setTimeout(() => inputRef.current?.focus(), 60);
        }
      };

      const persist = (updated) => {
        cardsRef.current = updated;
        save(updated).then(() => {
          setSaveIndicator("Saved ✓");
          setTimeout(() => setSaveIndicator(""), 1200);
        });
      };

      const updateCard = (cards, nl, updater) => cards.map(c => c.nl === nl ? updater(c) : c);

      const advance = (nextQueue, updatedCards) => {
        if (nextQueue.length === 0) { setSessionDone(true); return; }
        const next = updatedCards.find(c => c.nl === nextQueue[0].nl) || nextQueue[0];
        showCard(next, updatedCards);
      };

      const handleRecog = (opt) => {
        if (selected !== null) return;
        const word = wordFor(current.nl);
        const correct = opt === word.en;
        setSelected(opt);
        setIsCorrect(correct);
        setSessionStats(s => ({ seen: s.seen + 1, correct: s.correct + (correct ? 1 : 0) }));

        setAllCards(prev => {
          const updated = updateCard(prev, current.nl, c => {
            if (correct) {
              const newStreak = c.recogStreak + 1;
              if (newStreak >= 2) {
                // Graduate: production attempt happens in this session, SM-2 review tomorrow
                return { ...c, recogStreak: newStreak, phase: "prod", interval: 1, dueDate: addDays(today(), 1) };
              }
              // First pass: keep dueDate=today so it re-enters if session is interrupted
              return { ...c, recogStreak: newStreak, dueDate: today() };
            } else {
              return { ...c, recogStreak: 0, dueDate: today() };
            }
          });
          persist(updated);
          setQueue(q => {
            const next = q.slice(1);
            const card = updated.find(c => c.nl === current.nl);
            if (!correct) {
              // Wrong: back in a few cards, streak reset
              next.splice(Math.min(3, next.length), 0, card);
            } else if (card.recogStreak === 1) {
              // First recog passed: re-queue for second MCQ a few cards later
              next.splice(Math.min(5, next.length), 0, card);
            } else if (card.phase === "prod") {
              // Graduated: re-queue for immediate production attempt
              next.splice(Math.min(5, next.length), 0, card);
            }
            return next;
          });
          return updated;
        });
        if (correct) {
          const willGraduate = current.recogStreak + 1 >= 2;
          setTimeout(handleNextCard, willGraduate ? 1400 : 750);
        }
      };

      const handleProd = () => {
        if (submitted) return;
        const word = wordFor(current.nl);
        const correct = normalize(typed) === normalize(word.nl);
        setSubmitted(true);
        setIsCorrect(correct);
        setSessionStats(s => ({ seen: s.seen + 1, correct: s.correct + (correct ? 1 : 0) }));

        setAllCards(prev => {
          const updated = updateCard(prev, current.nl, c => {
            const q = correct ? 4 : 1;
            const { ef, interval, dueDate } = sm2(c, q);
            return { ...c, ef, interval, dueDate, lapses: correct ? c.lapses : c.lapses + 1 };
          });
          persist(updated);
          setQueue(q => {
            const next = q.slice(1);
            if (!correct) next.splice(Math.min(4, next.length), 0, updated.find(c => c.nl === current.nl));
            return next;
          });
          return updated;
        });
        if (correct) setTimeout(handleNextCard, 750);
      };

      const handleNextCard = () => {
        setQueue(prev => {
          advance(prev, cardsRef.current);
          return prev;
        });
      };

      const handleReset = async () => {
        if (!confirm("Reset ALL progress? Cannot be undone.")) return;
        try { localStorage.removeItem(STORAGE_KEY); } catch {}
        const fresh = initCards(null);
        cardsRef.current = fresh;
        setAllCards(fresh);
        launchSession(fresh);
      };

      if (loading) return (
        <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", color:"var(--text-2)", fontSize:14 }}>
          Loading…
        </div>
      );

      const t          = today();
      const mastered   = (allCards || []).filter(c => c.phase === "prod" && c.interval >= 21).length;
      const inProd     = (allCards || []).filter(c => c.phase === "prod" && c.interval < 21).length;
      const introduced = (allCards || []).filter(c => c.recogStreak > 0 || c.phase === "prod" || c.lapses > 0).length;
      const dueTomorrow= (allCards || []).filter(c => c.dueDate === addDays(t, 1)).length;
      const accuracy   = sessionStats.seen > 0 ? Math.round((sessionStats.correct / sessionStats.seen) * 100) : 0;
      const word       = current ? wordFor(current.nl) : null;
      const modeColor  = current?.phase === "prod" ? "var(--amber)" : "var(--violet)";

      return (
        <div style={{ minHeight:"100vh", display:"flex", flexDirection:"column", alignItems:"center", padding:"40px 20px 64px", position:"relative" }}>

          {/* Ambient depth */}
          <div className="orb orb-v" />
          <div className="orb orb-a" />

          <div style={{ width:"100%", maxWidth:456, position:"relative", zIndex:1 }}>

            {/* Header */}
            <div style={{ marginBottom:20 }}>
              <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", marginBottom:6 }}>
                <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                  <span style={{ fontSize:22 }}>🇳🇱</span>
                  <div>
                    <div style={{ fontSize:22, fontWeight:800, color:"var(--text)", letterSpacing:"-0.8px", lineHeight:1 }}>Woordenschat</div>
                    <div style={{ fontSize:11, color:"var(--text-2)", marginTop:4, letterSpacing:"0.1px", display:"flex", alignItems:"center", gap:6 }}>
                      <span>build your dutch</span>
                      {current && !sessionDone && (
                        <span style={{ color:modeColor, fontWeight:500 }}>· {current.phase === "prod" ? "produce" : "recognise"}</span>
                      )}
                    </div>
                  </div>
                </div>
                {saveIndicator && <span style={{ fontSize:11, color:"var(--green)", fontWeight:500, opacity:0.7, marginTop:2 }}>saved</span>}
              </div>
              <div style={{ fontSize:12, color:"var(--text-2)", display:"flex", flexWrap:"wrap", gap:"0 20px", marginTop:14, lineHeight:1 }}>
                <span><strong style={{ color:"var(--text)", fontWeight:600 }}>{introduced}</strong><span style={{ color:"var(--text-3)" }}>/{ALL_WORDS.length}</span></span>
                <span><strong style={{ color:"var(--text)", fontWeight:600 }}>{inProd}</strong> learning</span>
                <span><strong style={{ color:"var(--text)", fontWeight:600 }}>{mastered}</strong> mastered</span>
                {!sessionDone && queue.length > 0 && (
                  <span><strong style={{ color:"var(--text)", fontWeight:600 }}>{queue.length}</strong> left</span>
                )}
                {!sessionDone && sessionStats.seen > 0 && (
                  <span style={{ color: accuracy >= 80 ? "var(--green)" : accuracy >= 55 ? "var(--amber)" : "var(--red)", fontWeight:600 }}>
                    {accuracy}%
                  </span>
                )}
              </div>
            </div>

            {/* Progress bar */}
            <div style={{ height:2, background:"rgba(255,255,255,0.05)", borderRadius:2, marginBottom:30, overflow:"hidden" }}>
              <div style={{ height:"100%", display:"flex" }}>
                <div style={{ width:`${(mastered/ALL_WORDS.length)*100}%`, background:"var(--green)", opacity:0.7, transition:"width 0.6s ease" }} />
                <div style={{ width:`${(inProd/ALL_WORDS.length)*100}%`, background:"var(--amber)", opacity:0.6, transition:"width 0.6s ease" }} />
              </div>
            </div>

            {/* Session done */}
            {sessionDone ? (
              <div className="glass in" style={{ borderRadius:24, padding:"52px 36px", textAlign:"center" }}>
                <div style={{ fontSize:44, marginBottom:22, filter:"saturate(0.8)" }}>
                  {buildSessionQueue(allCards).length === 0 ? "🏆" : "✅"}
                </div>
                <h2 style={{ color:"var(--text)", margin:"0 0 10px", fontSize:22, fontWeight:700, letterSpacing:"-0.5px" }}>
                  {buildSessionQueue(allCards).length === 0 ? "All caught up" : "Session done"}
                </h2>
                <p style={{ color:"var(--text-2)", fontSize:14, margin:"0 0 6px", lineHeight:1.7 }}>
                  {sessionStats.seen > 0 ? `${sessionStats.seen} cards · ${accuracy}% accuracy` : "Nothing due right now."}
                </p>
                <p style={{ color:"var(--text-2)", fontSize:13, margin:"0 0 36px" }}>
                  {dueTomorrow} due tomorrow
                </p>
                <div style={{ display:"flex", flexDirection:"column", gap:9 }}>
                  <button onClick={() => launchSession(cardsRef.current)}
                    style={{ width:"100%", background:"var(--violet)", color:"#fff", border:"none", borderRadius:14, padding:"14px", fontSize:15, cursor:"pointer", fontWeight:600, fontFamily:"inherit", letterSpacing:"-0.2px" }}>
                    Check for due cards
                  </button>
                  <button onClick={() => launchExtraSession(cardsRef.current)}
                    style={{ width:"100%", background:"rgba(255,255,255,0.05)", color:"var(--text)", border:"1px solid var(--border)", borderRadius:14, padding:"14px", fontSize:15, cursor:"pointer", fontWeight:500, fontFamily:"inherit" }}>
                    Study more new cards →
                  </button>
                  <button onClick={handleReset}
                    style={{ background:"transparent", color:"var(--text-3)", border:"none", fontSize:12, cursor:"pointer", marginTop:8, fontFamily:"inherit" }}>
                    Reset progress
                  </button>
                </div>
              </div>

            ) : current && word ? (
              <div className="in">

                {/* Word card */}
                <div className="glass" style={{
                  borderRadius:22, padding:"42px 28px 38px", marginBottom:10, textAlign:"center",
                  borderTop: `1px solid ${current.phase === "prod" ? "rgba(217,141,66,0.45)" : "rgba(139,124,248,0.45)"}`,
                  boxShadow: "0 24px 64px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.06)",
                }}>
                  {current.phase === "recog" ? (
                    <>
                      <div style={{ fontSize:10, color:"var(--text-2)", marginBottom:20, textTransform:"uppercase", letterSpacing:"2.5px", fontWeight:600 }}>What does this mean?</div>
                      <div style={{ fontSize:58, fontWeight:800, color:"var(--text)", letterSpacing:"-2px", lineHeight:1.05 }}>{word.nl}</div>
                      {current.lapses > 0 && <div style={{ fontSize:11, color:"var(--red)", marginTop:16, fontWeight:500, opacity:0.8 }}>Previously difficult</div>}
                    </>
                  ) : (
                    <>
                      <div style={{ fontSize:10, color:"var(--text-2)", marginBottom:20, textTransform:"uppercase", letterSpacing:"2.5px", fontWeight:600 }}>Type the Dutch word</div>
                      <div style={{ fontSize:44, fontWeight:800, color:"var(--text)", letterSpacing:"-0.5px", lineHeight:1.2 }}>{word.en}</div>
                      <div style={{ fontSize:11, color:"var(--text-2)", marginTop:14 }}>
                        {current.interval > 1 ? `Review in ${current.interval} days if correct` : "First production attempt"}
                        {current.lapses > 0 ? ` · ${current.lapses} lapse${current.lapses !== 1 ? "s" : ""}` : ""}
                      </div>
                    </>
                  )}
                </div>

                {/* MCQ options */}
                {current.phase === "recog" && (
                  <div style={{ display:"flex", flexDirection:"column", gap:7 }}>
                    {options.map((opt, i) => {
                      const isAns   = selected !== null && opt === word.en;
                      const isWrong = selected !== null && opt === selected && !isAns;
                      return (
                        <button key={i} onClick={() => handleRecog(opt)}
                          className={`opt${selected !== null ? " done" : ""}`}
                          style={{
                            background: isAns ? "rgba(66,199,138,0.11)" : isWrong ? "rgba(217,98,98,0.10)" : "rgba(255,255,255,0.04)",
                            border: "1px solid " + (isAns ? "rgba(66,199,138,0.32)" : isWrong ? "rgba(217,98,98,0.32)" : "rgba(255,255,255,0.07)"),
                            borderRadius:14, padding:"13px 16px",
                            display:"flex", alignItems:"center", gap:13, width:"100%",
                          }}>
                          <span style={{
                            width:26, height:26, borderRadius:"50%", flexShrink:0,
                            display:"flex", alignItems:"center", justifyContent:"center",
                            background: isAns ? "rgba(66,199,138,0.18)" : isWrong ? "rgba(217,98,98,0.18)" : "rgba(255,255,255,0.05)",
                            color: isAns ? "var(--green)" : isWrong ? "var(--red)" : "var(--text-2)",
                            fontSize:11, fontWeight:700, fontFamily:"inherit",
                          }}>
                            {String.fromCharCode(65 + i)}
                          </span>
                          <span style={{ fontSize:15, color: isAns ? "var(--green)" : isWrong ? "var(--red)" : "var(--text)", fontWeight: isAns ? 500 : 400 }}>
                            {opt}
                          </span>
                        </button>
                      );
                    })}
                  </div>
                )}

                {/* Production */}
                {current.phase === "prod" && (
                  <div>
                    <input ref={inputRef} value={typed}
                      onChange={e => setTyped(e.target.value)}
                      onKeyDown={e => { if (e.key === "Enter" && !submitted) handleProd(); }}
                      disabled={submitted}
                      className="dutch"
                      placeholder="Type Dutch word…"
                      style={{
                        width:"100%", padding:"16px 18px", fontSize:20,
                        borderRadius:14,
                        border: "1px solid " + (submitted ? (isCorrect ? "rgba(66,199,138,0.5)" : "rgba(217,98,98,0.5)") : "rgba(255,255,255,0.1)"),
                        background: submitted ? (isCorrect ? "rgba(66,199,138,0.08)" : "rgba(217,98,98,0.08)") : "rgba(255,255,255,0.05)",
                        color: submitted ? (isCorrect ? "var(--green)" : "var(--red)") : "var(--text)",
                        fontWeight:600, outline:"none", letterSpacing:"-0.3px",
                        transition:"border-color 0.15s, background 0.2s",
                        fontFamily:"inherit",
                      }}
                    />
                    {!submitted && (
                      <button onClick={handleProd}
                        style={{ marginTop:8, width:"100%", background:"var(--amber)", color:"#fff", border:"none", borderRadius:14, padding:"14px", fontSize:15, cursor:"pointer", fontWeight:600, fontFamily:"inherit" }}>
                        Check ↵
                      </button>
                    )}
                    {submitted && !isCorrect && (
                      <div style={{ marginTop:8, padding:"12px 16px", background:"rgba(217,141,66,0.08)", border:"1px solid rgba(217,141,66,0.2)", borderRadius:12, fontSize:14, color:"var(--amber)", fontWeight:500 }}>
                        {word.nl}
                      </div>
                    )}
                  </div>
                )}

                {/* Feedback */}
                {(selected !== null || submitted) && (
                  <div style={{ marginTop:18, textAlign:"center" }}>
                    <p style={{ fontSize:13, fontWeight:500, margin: isCorrect ? 0 : "0 0 14px", color: isCorrect ? "var(--green)" : "var(--red)", letterSpacing:"0.1px" }}>
                      {isCorrect ? "Correct" : (current.phase === "recog" ? word.en : word.nl)}
                      {isCorrect && current.phase === "recog" && (() => {
                        const u = cardsRef.current?.find(c => c.nl === current.nl);
                        if (u?.phase === "prod") return <span style={{ color:"var(--violet)", fontWeight:400 }}> — now type it</span>;
                        return <span style={{ color:"var(--text-2)", fontWeight:400 }}> — coming back</span>;
                      })()}
                      {isCorrect && current.phase === "prod" && (() => {
                        const u = cardsRef.current?.find(c => c.nl === current.nl);
                        if (u) return <span style={{ color:"var(--text-2)", fontWeight:400 }}> — back in {u.interval} day{u.interval !== 1 ? "s" : ""}</span>;
                      })()}
                    </p>
                    {!isCorrect && (
                      <button onClick={handleNextCard}
                        style={{ background:"rgba(255,255,255,0.07)", color:"var(--text)", border:"1px solid var(--border)", borderRadius:12, padding:"11px 32px", fontSize:14, cursor:"pointer", fontWeight:500, fontFamily:"inherit" }}>
                        Continue →
                      </button>
                    )}
                  </div>
                )}
              </div>
            ) : null}

            {!sessionDone && (
              <button onClick={handleReset} style={{ display:"block", margin:"40px auto 0", background:"transparent", color:"var(--text-2)", border:"none", fontSize:11, cursor:"pointer", fontFamily:"inherit" }}>
                reset progress
              </button>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
