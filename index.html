    .btn-option {

      cursor: pointer;
      font-family: inherit;
    }
    .btn-option:hover {
      background: rgba(255,255,255,0.05) !important;
      transform: translateX(4px);
    }
    .btn-option.answered {
      cursor: default;
      transform: none !important;
      pointer-events: none;
    }

    input.prod-input:focus {
      border-color: #6366f1 !important;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.2);
      outline: none;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card-anim { animation: cardIn 0.22s ease; }

    const BODY    = new Set(["hand","voet","oog","oor","neus","mond","lip","tong","nek","arm","schouder","knie","vinger","hart","bloed","hoofd","rug","buik","borst","hals","been","tand","keel","wangen","voorhoofd"]);
    const FAMILY  = new Set(["moeder","vader","broer","zuster","zoon","dochter","tante","oom","kind","vrouw","man","vriend","vriendin","partner","baby","mama","gezin"]);
    const ADVERBS = new Set(["niet","ook","al","dan","zo","nu","hier","daar","ver","later","eerst","alleen","verder","nog","soms","meer","misschien","eigenlijk","altijd","nooit","bijna","heel","zelfs","ooit","opnieuw","thuis","meteen","plotseling","eindelijk","overal","ergens","nergens","dagelijks","toch","dus","immers","namelijk","trouwens","bovendien","tenslotte","echter","nogal","vrijwel","nauwelijks","ongeveer","uiteindelijk","inderdaad","ongetwijfeld","inmiddels","intussen","toevallig","uitsluitend","wellicht"]);

    function getCategory(w) {
      if (VERBS.has(w.nl))   return "verb";
      if (COLORS.has(w.nl))  return "color";
      if (NUMBERS.has(w.nl)) return "number";
      if (BODY.has(w.nl))    return "body";
      if (FAMILY.has(w.nl))  return "family";
      if (ADVERBS.has(w.nl)) return "adverb";
      return "noun";
    }

    function getDistractors(word, n = 3) {
      const cat  = getCategory(word);
      const same  = shuffle(ALL_WORDS.filter(w => w.nl !== word.nl && getCategory(w) === cat));
      const other = shuffle(ALL_WORDS.filter(w => w.nl !== word.nl && getCategory(w) !== cat));
      return [...same, ...other].slice(0, n).map(w => w.en);
    }

    // ─── SM-2 algorithm ───────────────────────────────────────────────────────
    // phase recog: MCQ, needs 2 consecutive correct → promotes to prod
    // phase prod:  type the Dutch word, SM-2 interval growth
    // ef starts at 2.5, min 1.3

    const today    = () => new Date().toISOString().slice(0, 10);
    const addDays  = (d, n) => { const dt = new Date(d); dt.setDate(dt.getDate() + n); return dt.toISOString().slice(0, 10); };
    const daysBetween = (a, b) => Math.round((new Date(b) - new Date(a)) / 86400000);

    function newCard(nl) {
      return { nl, phase: "recog", interval: 1, ef: 2.5, dueDate: today(), lapses: 0, recogStreak: 0 };
    }

    function sm2(card, q) {
      let { interval, ef } = card;
      const newEf = Math.max(1.3, ef + 0.1 - (5 - q) * (0.08 + (5 - q) * 0.02));
      let newInterval;
      if (q < 3) {
        newInterval = 1;
      } else {
        if (interval === 1)      newInterval = 4;
        else if (interval <= 4)  newInterval = 6;
        else                     newInterval = Math.round(interval * newEf);
      }
      return { ef: newEf, interval: newInterval, dueDate: addDays(today(), newInterval) };
    }

    // ─── Storage (localStorage) ───────────────────────────────────────────────
    const STORAGE_KEY    = "dutch-sm2-v1";
    async function load() {
      try {
        const r = localStorage.getItem(STORAGE_KEY);
        return r ? JSON.parse(r) : null;
      } catch { return null; }
    }

    async function save(cards) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(cards));
      } catch (e) { console.error(e); }
    }

    function initCards(saved) {
      const savedMap = new Map((saved || []).map(c => [c.nl, c]));
      return ALL_WORDS.map(w => savedMap.get(w.nl) || newCard(w.nl));
    }

    // ─── Helpers ──────────────────────────────────────────────────────────────
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function normalize(s) {
      return s.trim().toLowerCase().replace(/[^a-záàäéèëíìïóòöúùüijn ]/g, "");
    }

    function wordFor(nl) {
      return ALL_WORDS.find(w => w.nl === nl);
    }

    function buildSessionQueue(cards) {
      const t = today();
      const due = cards
        .filter(c => c.dueDate <= t)
        .sort((a, b) => (a.dueDate < b.dueDate ? -1 : 1));

      const reviews  = due.filter(c => !(c.recogStreak === 0 && c.lapses === 0 && c.phase === "recog"));
      const newCards  = due.filter(c =>   c.recogStreak === 0 && c.lapses === 0 && c.phase === "recog").slice(0, 15);

      // interleave: 2 reviews per 1 new card
      const queue = [];
      let ri = 0, ni = 0;
      while (ri < reviews.length || ni < newCards.length) {
        if (ri < reviews.length) queue.push(reviews[ri++]);
        if (ri < reviews.length) queue.push(reviews[ri++]);
        if (ni < newCards.length) queue.push(newCards[ni++]);
      }
      return queue;
    }

    // ─── App ──────────────────────────────────────────────────────────────────
    function App() {
      const [allCards,     setAllCards]     = useState(null);
      const [queue,        setQueue]        = useState([]);
      const [current,      setCurrent]      = useState(null);
      const [options,      setOptions]      = useState([]);
      const [selected,     setSelected]     = useState(null);
      const [typed,        setTyped]        = useState("");
      const [submitted,    setSubmitted]    = useState(false);
      const [isCorrect,    setIsCorrect]    = useState(null);
      const [sessionStats, setSessionStats] = useState({ correct: 0, seen: 0 });
      const [sessionDone,  setSessionDone]  = useState(false);
      const [loading,      setLoading]      = useState(true);
      const [saveIndicator,setSaveIndicator]= useState("");
      const inputRef  = useRef(null);
      const cardsRef  = useRef(null);

      useEffect(() => {
        load().then(saved => {
          const cards = initCards(saved);
          cardsRef.current = cards;
          setAllCards(cards);
          setLoading(false);
          launchSession(cards);
        });
      }, []);

      const launchSession = (cards) => {
        const q = buildSessionQueue(cards);
        setQueue(q);
        setSessionStats({ correct: 0, seen: 0 });
        setSessionDone(false);
        if (q.length === 0) { setSessionDone(true); return; }
        showCard(q[0], cards);
      };

      const launchExtraSession = (cards) => {
        const unseen = cards.filter(c => c.recogStreak === 0 && c.lapses === 0 && c.phase === "recog");
        if (unseen.length === 0) { alert("No more new cards left!"); return; }
        const batch = unseen.slice(0, 15);
        setQueue(batch);
        setSessionStats({ correct: 0, seen: 0 });
        setSessionDone(false);
        showCard(batch[0], cards);
      };

      const showCard = (cardData, cards) => {
        const word = wordFor(cardData.nl);
        setCurrent(cardData);
        setSelected(null);
        setTyped("");
        setSubmitted(false);
        setIsCorrect(null);
        if (cardData.phase === "recog") {
          setOptions(shuffle([word.en, ...getDistractors(word)]));
        } else {
          setOptions([]);
          setTimeout(() => inputRef.current?.focus(), 60);
        }
      };

      const persist = (updated) => {
        cardsRef.current = updated;
        save(updated).then(() => {
          setSaveIndicator("Saved ✓");
          setTimeout(() => setSaveIndicator(""), 1200);
        });
      };

      const updateCard = (cards, nl, updater) => cards.map(c => c.nl === nl ? updater(c) : c);

      const advance = (nextQueue, updatedCards) => {
        if (nextQueue.length === 0) { setSessionDone(true); return; }
        const next = updatedCards.find(c => c.nl === nextQueue[0].nl) || nextQueue[0];
        showCard(next, updatedCards);
      };

      const handleRecog = (opt) => {
        if (selected !== null) return;
        const word = wordFor(current.nl);
        const correct = opt === word.en;
        setSelected(opt);
        setIsCorrect(correct);
        setSessionStats(s => ({ seen: s.seen + 1, correct: s.correct + (correct ? 1 : 0) }));

        setAllCards(prev => {
          const updated = updateCard(prev, current.nl, c => {
            if (correct) {
              const newStreak = c.recogStreak + 1;
              if (newStreak >= 2) {
                // Graduate: production attempt happens in this session, SM-2 review tomorrow
                return { ...c, recogStreak: newStreak, phase: "prod", interval: 1, dueDate: addDays(today(), 1) };
              }
              // First pass: keep dueDate=today so it re-enters if session is interrupted
              return { ...c, recogStreak: newStreak, dueDate: today() };
            } else {
              return { ...c, recogStreak: 0, dueDate: today() };
            }
          });
          persist(updated);
          setQueue(q => {
            const next = q.slice(1);
            const card = updated.find(c => c.nl === current.nl);
            if (!correct) {
              // Wrong: back in a few cards, streak reset
              next.splice(Math.min(3, next.length), 0, card);
            } else if (card.recogStreak === 1) {
              // First recog passed: re-queue for second MCQ a few cards later
              next.splice(Math.min(5, next.length), 0, card);
            } else if (card.phase === "prod") {
              // Graduated: re-queue for immediate production attempt
              next.splice(Math.min(5, next.length), 0, card);
            }
            return next;
          });
          return updated;
        });
        if (correct) {
          const willGraduate = current.recogStreak + 1 >= 2;
          setTimeout(handleNextCard, willGraduate ? 1400 : 750);
        }
      };

      const handleProd = () => {
        if (submitted) return;
        const word = wordFor(current.nl);
        const correct = normalize(typed) === normalize(word.nl);
        setSubmitted(true);
        setIsCorrect(correct);
        setSessionStats(s => ({ seen: s.seen + 1, correct: s.correct + (correct ? 1 : 0) }));

        setAllCards(prev => {
          const updated = updateCard(prev, current.nl, c => {
            const q = correct ? 4 : 1;
            const { ef, interval, dueDate } = sm2(c, q);
            return { ...c, ef, interval, dueDate, lapses: correct ? c.lapses : c.lapses + 1 };
          });
          persist(updated);
          setQueue(q => {
            const next = q.slice(1);
            if (!correct) next.splice(Math.min(4, next.length), 0, updated.find(c => c.nl === current.nl));
            return next;
          });
          return updated;
        });
        if (correct) setTimeout(handleNextCard, 750);
      };

      const handleNextCard = () => {
        setQueue(prev => {
          advance(prev, cardsRef.current);
          return prev;
        });
      };

      const handleReset = async () => {
        if (!confirm("Reset ALL progress? Cannot be undone.")) return;
        try { localStorage.removeItem(STORAGE_KEY); } catch {}
        const fresh = initCards(null);
        cardsRef.current = fresh;
        setAllCards(fresh);
        launchSession(fresh);
      };

      if (loading) return (
        <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "system-ui", color: "var(--text-secondary)" }}>
          Loading your progress...
        </div>
      );

      const t          = today();
      const mastered   = (allCards || []).filter(c => c.phase === "prod" && c.interval >= 21).length;
      const inProd     = (allCards || []).filter(c => c.phase === "prod" && c.interval < 21).length;
      const introduced = (allCards || []).filter(c => c.recogStreak > 0 || c.phase === "prod" || c.lapses > 0).length;
      const dueTomorrow= (allCards || []).filter(c => c.dueDate === addDays(t, 1)).length;
      const accuracy   = sessionStats.seen > 0 ? Math.round((sessionStats.correct / sessionStats.seen) * 100) : 0;
      const word       = current ? wordFor(current.nl) : null;
      const modeColor  = current?.phase === "prod" ? "#f59e0b" : "#6366f1";

      return (
        <div style={{ minHeight: "100vh", background: "var(--bg-primary)", display: "flex", flexDirection: "column", alignItems: "center", padding: "32px 20px 48px", fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" }}>

          {/* Header */}
          <div style={{ width: "100%", maxWidth: 480, marginBottom: 28 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <span style={{ fontSize: 24 }}>🇳🇱</span>
                <span style={{ fontSize: 17, fontWeight: 700, color: "var(--text-primary)", letterSpacing: "-0.3px" }}>Dutch Vocab</span>
              </div>
              <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                {saveIndicator && (
                  <span style={{ fontSize: 11, color: "#22c55e", fontWeight: 600, background: "rgba(34,197,94,0.12)", padding: "4px 10px", borderRadius: 20 }}>
                    ✓ Saved
                  </span>
                )}
                {current && !sessionDone && (
                  <span style={{ fontSize: 11, background: modeColor, color: "#fff", borderRadius: 20, padding: "4px 12px", fontWeight: 700, letterSpacing: "0.8px", textTransform: "uppercase" }}>
                    {current.phase === "prod" ? "✍ Produce" : "● Recognise"}
                  </span>
                )}
              </div>
            </div>

            {/* Stat pills */}
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 16 }}>
              {[
                { value: `${introduced}/${ALL_WORDS.length}`, label: "introduced" },
                { value: inProd,       label: "learning"   },
                { value: mastered,     label: "mastered"   },
                { value: queue.length, label: "left"       },
                ...(sessionStats.seen > 0 && !sessionDone ? [{ value: `${accuracy}%`, label: "accuracy" }] : []),
              ].map(({ value, label }) => (
                <div key={label} style={{ background: "var(--bg-secondary)", border: "1px solid var(--border-primary)", borderRadius: 10, padding: "7px 13px" }}>
                  <div style={{ fontSize: 15, fontWeight: 700, color: "var(--text-primary)", lineHeight: 1 }}>{value}</div>
                  <div style={{ fontSize: 10, color: "var(--text-tertiary)", textTransform: "uppercase", letterSpacing: "0.6px", marginTop: 3 }}>{label}</div>
                </div>
              ))}
            </div>

            {/* Progress bar */}
            <div style={{ height: 4, background: "var(--bg-elevated)", borderRadius: 4, overflow: "hidden" }}>
              <div style={{ height: "100%", display: "flex" }}>
                <div style={{ width: `${(mastered / ALL_WORDS.length) * 100}%`, background: "linear-gradient(90deg,#16a34a,#22c55e)", transition: "width 0.5s ease" }} />
                <div style={{ width: `${(inProd   / ALL_WORDS.length) * 100}%`, background: "linear-gradient(90deg,#d97706,#f59e0b)", transition: "width 0.5s ease" }} />
              </div>
            </div>
            <div style={{ display: "flex", gap: 16, marginTop: 7 }}>
              <span style={{ fontSize: 10, color: "#22c55e", letterSpacing: "0.3px" }}>● mastered</span>
              <span style={{ fontSize: 10, color: "#f59e0b", letterSpacing: "0.3px" }}>● learning</span>
              <span style={{ fontSize: 10, color: "var(--text-tertiary)", letterSpacing: "0.3px" }}>● unseen</span>
            </div>
          </div>

          {/* Session done */}
          {sessionDone ? (
            <div className="card-anim" style={{ maxWidth: 480, width: "100%", background: "var(--bg-secondary)", border: "1px solid var(--border-primary)", borderRadius: 22, padding: "44px 32px", textAlign: "center" }}>
              <div style={{ fontSize: 54, marginBottom: 18 }}>
                {buildSessionQueue(allCards).length === 0 ? "🏆" : "✅"}
              </div>
              <h2 style={{ color: "var(--text-primary)", margin: "0 0 10px", fontSize: 24, fontWeight: 800, letterSpacing: "-0.5px" }}>
                {buildSessionQueue(allCards).length === 0 ? "All caught up!" : "Session complete!"}
              </h2>
              <p style={{ color: "var(--text-secondary)", fontSize: 14, margin: "0 0 4px", lineHeight: 1.6 }}>
                {sessionStats.seen > 0 ? `${sessionStats.seen} cards reviewed · ${accuracy}% accuracy` : "Nothing was due."}
              </p>
              <p style={{ color: "var(--text-tertiary)", fontSize: 13, margin: "0 0 32px", lineHeight: 1.6 }}>
                {dueTomorrow} cards due tomorrow.
              </p>
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                <button onClick={() => launchSession(cardsRef.current)}
                  style={{ width: "100%", background: "#6366f1", color: "#fff", border: "none", borderRadius: 13, padding: "14px", fontSize: 15, cursor: "pointer", fontWeight: 700, letterSpacing: "-0.2px" }}>
                  Check for new cards
                </button>
                <button onClick={() => launchExtraSession(cardsRef.current)}
                  style={{ width: "100%", background: "var(--bg-elevated)", color: "var(--text-primary)", border: "1px solid var(--border-primary)", borderRadius: 13, padding: "14px", fontSize: 15, cursor: "pointer", fontWeight: 600 }}>
                  Study more new cards →
                </button>
                <button onClick={handleReset}
                  style={{ background: "transparent", color: "var(--text-tertiary)", border: "none", fontSize: 12, cursor: "pointer", padding: "6px", marginTop: 4, textDecoration: "underline", opacity: 0.7 }}>
                  Reset all progress
                </button>
              </div>
            </div>

          ) : current && word ? (
            <div className="card-anim" style={{ maxWidth: 480, width: "100%" }}>

              {/* Word card */}
              <div style={{ background: "var(--bg-secondary)", border: "1px solid var(--border-primary)", borderRadius: 22, padding: "36px 28px", marginBottom: 12, textAlign: "center", borderTop: `3px solid ${modeColor}`, boxShadow: "0 12px 40px rgba(0,0,0,0.4)" }}>
                {current.phase === "recog" ? (
                  <>
                    <div style={{ fontSize: 10, color: "var(--text-tertiary)", marginBottom: 16, textTransform: "uppercase", letterSpacing: "2px", fontWeight: 700 }}>What does this mean?</div>
                    <div style={{ fontSize: 54, fontWeight: 800, color: "var(--text-primary)", letterSpacing: "-1.5px", lineHeight: 1.1 }}>{word.nl}</div>
                    {current.lapses > 0 && <div style={{ fontSize: 11, color: "#ef4444", marginTop: 14, fontWeight: 600, letterSpacing: "0.3px" }}>⚠ Previously difficult</div>}
                  </>
                ) : (
                  <>
                    <div style={{ fontSize: 10, color: "var(--text-tertiary)", marginBottom: 16, textTransform: "uppercase", letterSpacing: "2px", fontWeight: 700 }}>Type the Dutch word</div>
                    <div style={{ fontSize: 40, fontWeight: 800, color: "var(--text-primary)", letterSpacing: "-0.5px", lineHeight: 1.2 }}>{word.en}</div>
                    <div style={{ fontSize: 11, color: "var(--text-tertiary)", marginTop: 14, letterSpacing: "0.2px" }}>
                      {current.interval > 1 ? `Next review in ${current.interval} days if correct` : "First production attempt"}
                      {current.lapses > 0 ? ` · ${current.lapses} lapse${current.lapses !== 1 ? "s" : ""}` : ""}
                    </div>
                  </>
                )}
              </div>

              {/* MCQ options */}
              {current.phase === "recog" && (
                <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                  {options.map((opt, i) => {
                    const isAnswer = selected !== null && opt === word.en;
                    const isWrong  = selected !== null && opt === selected && opt !== word.en;
                    return (
                      <button key={i} onClick={() => handleRecog(opt)}
                        className={`btn-option${selected !== null ? " answered" : ""}`}
                        style={{
                          background: isAnswer ? "rgba(34,197,94,0.13)" : isWrong ? "rgba(239,68,68,0.11)" : "var(--bg-elevated)",
                          border:     "1px solid " + (isAnswer ? "rgba(34,197,94,0.45)" : isWrong ? "rgba(239,68,68,0.45)" : "var(--border-primary)"),
                          borderLeft: "3px solid " + (isAnswer ? "#22c55e" : isWrong ? "#ef4444" : "transparent"),
                          borderRadius: 14, padding: "14px 16px",
                          display: "flex", alignItems: "center", gap: 14,
                          width: "100%", textAlign: "left",
                        }}>
                        <span style={{
                          width: 30, height: 30, borderRadius: "50%", flexShrink: 0,
                          display: "flex", alignItems: "center", justifyContent: "center",
                          background: isAnswer ? "#22c55e" : isWrong ? "#ef4444" : "var(--bg-primary)",
                          color: isAnswer || isWrong ? "#fff" : "var(--text-tertiary)",
                          fontSize: 12, fontWeight: 700,
                        }}>
                          {String.fromCharCode(65 + i)}
                        </span>
                        <span style={{ fontSize: 15, color: isAnswer ? "#4ade80" : isWrong ? "#f87171" : "var(--text-primary)", fontWeight: isAnswer ? 600 : 400 }}>
                          {opt}
                        </span>
                      </button>
                    );
                  })}
                </div>
              )}

              {/* Production */}
              {current.phase === "prod" && (
                <div>
                  <input ref={inputRef} value={typed}
                    onChange={e => setTyped(e.target.value)}
                    onKeyDown={e => { if (e.key === "Enter" && !submitted) handleProd(); }}
                    disabled={submitted}
                    className="prod-input"
                    placeholder="Type Dutch word…"
                    style={{
                      width: "100%", padding: "16px 18px", fontSize: 20,
                      borderRadius: 14,
                      border: "2px solid " + (submitted ? (isCorrect ? "#22c55e" : "#ef4444") : "var(--border-primary)"),
                      background: submitted ? (isCorrect ? "rgba(34,197,94,0.12)" : "rgba(239,68,68,0.10)") : "var(--bg-elevated)",
                      color: submitted ? (isCorrect ? "#4ade80" : "#f87171") : "var(--text-primary)",
                      fontWeight: 700, outline: "none", letterSpacing: "-0.3px",
                      transition: "border-color 0.15s, background 0.15s",
                    }}
                  />
                  {!submitted && (
                    <button onClick={handleProd}
                      style={{ marginTop: 10, width: "100%", background: "#f59e0b", color: "#fff", border: "none", borderRadius: 13, padding: "14px", fontSize: 15, cursor: "pointer", fontWeight: 700, letterSpacing: "-0.2px" }}>
                      Check ↵
                    </button>
                  )}
                  {submitted && !isCorrect && (
                    <div style={{ marginTop: 10, padding: "13px 16px", background: "rgba(245,158,11,0.08)", border: "1px solid rgba(245,158,11,0.25)", borderRadius: 12, fontSize: 14, color: "#fbbf24" }}>
                      Correct answer: <strong>{word.nl}</strong>
                    </div>
                  )}
                </div>
              )}

              {/* Feedback */}
              {(selected !== null || submitted) && (
                <div style={{ marginTop: 16, textAlign: "center" }}>
                  <div style={{ fontSize: 13, fontWeight: 600, marginBottom: isCorrect ? 0 : 14, color: isCorrect ? "#22c55e" : "#ef4444", letterSpacing: "0.2px" }}>
                    {isCorrect ? "✓ Correct" : `✗ ${current.phase === "recog" ? `"${word.en}"` : `"${word.nl}"`}`}
                    {isCorrect && current.phase === "recog" && (() => {
                      const updated = cardsRef.current?.find(c => c.nl === current.nl);
                      if (updated?.phase === "prod") return <span style={{ color: "#818cf8", fontWeight: 500 }}> · now type it 🎓</span>;
                      return <span style={{ color: "var(--text-tertiary)", fontWeight: 400 }}> · coming back shortly</span>;
                    })()}
                    {isCorrect && current.phase === "prod" && (() => {
                      const updated = cardsRef.current?.find(c => c.nl === current.nl);
                      if (updated) return <span style={{ color: "var(--text-tertiary)", fontWeight: 400 }}> · back in {updated.interval} day{updated.interval !== 1 ? "s" : ""}</span>;
                    })()}
                  </div>
                  {!isCorrect && (
                    <button onClick={handleNextCard}
                      style={{ background: "#6366f1", color: "#fff", border: "none", borderRadius: 12, padding: "12px 36px", fontSize: 15, cursor: "pointer", fontWeight: 700 }}>
                      Next →
                    </button>
                  )}
                </div>
              )}
            </div>
          ) : null}

          {!sessionDone && (
            <button onClick={handleReset} style={{ marginTop: 36, background: "transparent", color: "var(--text-tertiary)", border: "none", fontSize: 11, cursor: "pointer", textDecoration: "underline", opacity: 0.5 }}>
              Reset all progress
            </button>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
